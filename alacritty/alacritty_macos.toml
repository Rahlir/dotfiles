# Configuration for Alacritty
#
# by Tadeas Uhlir <tadeas.uhlir@gmail.com>

[general]
# Import theme
import = ["~/.config/alacritty/theme.toml"]

# Font configuration
[font]
size = 12.0

[font.normal]
family = "BlexMono Nerd Font"
style = "Regular"

[font.italic]
family = "BlexMono Nerd Font"
style = "Italic"

[font.bold]
family = "BlexMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "BlexMono Nerd Font"
style = "Bold Italic"

[window]
# Make option act as alt. macOS only option.
option_as_alt = "Both"

# Explicit CSI u sequences for modified Enter.
# tmux requests extended keys via xterm modifyOtherKeys (CSI > 4 ; 2 m),
# but Alacritty only supports the kitty keyboard protocol. These bindings
# bypass the protocol negotiation so Ctrl/Shift-Enter work inside tmux.
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B[13;2u"

[[keyboard.bindings]]
key = "Return"
mods = "Control"
chars = "\u001B[13;5u"
